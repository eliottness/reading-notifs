name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Generate DB migrations
        run: npm run db:generate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Baseline is ~1 min; cap the job so a stalled browser download (see below) fails fast
    # instead of hanging until GitHub's 6-hour default.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate DB migrations
        run: npm run db:generate

      # Install the apt browser libraries separately from the browser download. This is the
      # fast, reliable half of `playwright install --with-deps`.
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      # Playwright 1.58's pinned chromium (build v1208) intermittently deadlocks right after
      # the browser archive reaches 100% in non-TTY CI — the process hangs with no further
      # output. Bound each attempt with a hard timeout and retry so a stalled download is
      # killed and re-attempted instead of hanging the whole job.
      - name: Install Playwright Chromium browser
        run: |
          for attempt in 1 2 3; do
            echo "Chromium install attempt $attempt"
            if timeout -k 10 300 npx playwright install chromium; then
              exit 0
            fi
            echo "::warning::Chromium install attempt $attempt stalled or failed; retrying"
          done
          echo "::error::playwright install chromium failed after 3 attempts"
          exit 1

      - name: Run Playwright E2E suite
        # The Playwright webServer (see playwright.config.ts) boots the app with the full TEST_MODE /
        # VAPID / SMTP / PORT env; no extra env is needed here.
        run: npm run test:e2e

  helm:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint chart
        run: helm lint charts/reading-notifs

      - name: Render chart (default values + required secret)
        run: helm template reading-notifs charts/reading-notifs --set secrets.betterAuthSecret=ci-test > /tmp/rendered.yaml

      - name: Render chart (ingress disabled, existing secret)
        run: helm template reading-notifs charts/reading-notifs --set ingress.enabled=false --set secrets.existingSecret=my-secret > /dev/null

      - name: Fail-fast when the required secret is missing
        run: |
          if helm template reading-notifs charts/reading-notifs > /dev/null 2>&1; then
            echo "::error::Chart rendered without secrets.betterAuthSecret; it should have failed."
            exit 1
          fi
          echo "Chart correctly refused to render without secrets.betterAuthSecret."

  helm-deploy:
    # Proves the chart actually applies to a real cluster and the app boots: build the
    # image, install into a throwaway kind cluster, wait for the rollout, then helm test.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build app image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: reading-notifs:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: chart-testing

      - name: Load image into kind
        run: kind load docker-image reading-notifs:ci --name chart-testing

      - name: Install chart
        # pullPolicy=Never forces use of the kind-loaded image; --wait blocks until the
        # Deployment is Available (covers startup migrations + seed before listening).
        run: |
          helm install rn charts/reading-notifs \
            --namespace rn --create-namespace \
            --set image.repository=reading-notifs \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --set secrets.betterAuthSecret=ci-test-secret \
            --wait --timeout 5m

      - name: Verify rollout
        run: kubectl --namespace rn rollout status deploy/rn-reading-notifs --timeout=300s

      - name: Run helm test
        run: helm test rn --namespace rn

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl --namespace rn get all || true
          kubectl --namespace rn describe pods || true
          kubectl --namespace rn logs deploy/rn-reading-notifs --tail=200 || true
