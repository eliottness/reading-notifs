version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # playwright-core is HARD-COUPLED to the camoufox sidecar image's bundled
      # Playwright (1.58). Playwright rejects any major.minor mismatch at the WS
      # handshake (428 Precondition Required), so a minor/major bump would silently
      # break all stealth fetches. Patch bumps within 1.58.x are ALLOWED — the WS
      # handshake checks major.minor only (not patch), and patches may carry security fixes.
      # NOTE: @playwright/test is deliberately NOT ignored — it is not sidecar-coupled
      # (only playwright-core's firefox.connect() is) and must stay on a Node-26-safe
      # release. See .omc/plans/camoufox-sidecar-split.md for re-validation procedure.
      - dependency-name: 'playwright-core'
        update-types: ['version-update:semver-minor', 'version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
