apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reading-notifs.fullname" . }}
  labels:
    {{- include "reading-notifs.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  APP_URL: {{ include "reading-notifs.appUrl" . | quote }}
  DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
  ADMIN_EMAILS: {{ .Values.config.adminEmails | quote }}
  SMTP_HOST: {{ .Values.config.smtp.host | quote }}
  SMTP_PORT: {{ .Values.config.smtp.port | toString | quote }}
  SMTP_FROM: {{ .Values.config.smtp.from | quote }}
  VAPID_PUBLIC_KEY: {{ .Values.config.vapid.publicKey | quote }}
  VAPID_SUBJECT: {{ .Values.config.vapid.subject | quote }}
  {{- if .Values.camoufox.enabled }}
  # localhost — the native-sidecar camoufox container shares the pod network namespace.
  # Full WS URL including the pinned path (getBrowser passes it straight to firefox.connect).
  CAMOUFOX_WS_ENDPOINT: {{ printf "ws://localhost:%v/%s" .Values.camoufox.port .Values.camoufox.wsPath | quote }}
  {{- end }}
