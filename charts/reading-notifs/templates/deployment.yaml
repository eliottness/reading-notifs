{{- if gt (int .Values.replicaCount) 1 }}
{{- fail "replicaCount must be 1: reading-notifs uses an embedded SQLite database (single writer) and an in-process cron poller, so it cannot be scaled horizontally." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reading-notifs.fullname" . }}
  labels:
    {{- include "reading-notifs.labels" . | nindent 4 }}
spec:
  # Single writer to SQLite + an in-process cron poller: never scale beyond 1.
  # The fail guard above rejects any value > 1; this stays templated so the
  # declared value is actually honoured rather than silently ignored.
  replicas: {{ .Values.replicaCount }}
  strategy:
    # The data volume is ReadWriteOnce; a rolling update would try to attach it to two pods.
    type: Recreate
  selector:
    matchLabels:
      {{- include "reading-notifs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the rendered config/secret change.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "reading-notifs.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "reading-notifs.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.camoufox.enabled }}
      # Native sidecar: an initContainer with restartPolicy: Always starts and passes its
      # startupProbe BEFORE the app container, runs for the full pod lifetime, and restarts
      # independently on crash. Requires Kubernetes >= 1.29 (GA) / >= 1.28 (beta gate).
      initContainers:
        - name: camoufox
          restartPolicy: Always
          # IMAGE VERSION IS LOCKED — thebtf/camoufox-server bundles Playwright 1.58.0, which
          # MUST match playwright-core@~1.58.0 in package.json (WS handshake checks major.minor).
          # Do NOT change without re-validating — see .omc/plans/camoufox-sidecar-split.md
          # DIGEST ALSO IN: docker-compose.yml — when updating, change BOTH files.
          # Only the registry prefix is operator-configurable (air-gapped/mirror deployments);
          # repository+digest are hardcoded to prevent operator-induced version skew.
          image: "{{ .Values.camoufox.image.registry | default `docker.io` }}/thebtf/camoufox-server@sha256:c19372cb2abf05dfb58cda0cc40324b157d47dc22aa791fb571c607f2337332c"
          imagePullPolicy: IfNotPresent
          env:
            - name: WS_PATH
              value: {{ .Values.camoufox.wsPath | quote }}
            - name: WS_PORT
              value: {{ .Values.camoufox.port | quote }}
          ports:
            - name: camoufox-ws
              containerPort: {{ .Values.camoufox.port }}
              protocol: TCP
          startupProbe:
            # tcpSocket is sufficient here: native-sidecar ordering is the real startup gate
            # (the app container does not start until this probe passes).
            tcpSocket:
              port: camoufox-ws
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: camoufox-ws
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.camoufox.resources | nindent 12 }}
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            # PORT is pinned to service.port — the container port, Service and all
            # probes target it, so it must stay the single source of truth. To change
            # the listen port, set service.port (do NOT override PORT via extraEnv).
            - name: PORT
              value: {{ .Values.service.port | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "reading-notifs.fullname" . }}
            - secretRef:
                name: {{ include "reading-notifs.secretName" . }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      {{- if or .Values.persistence.enabled .Values.camoufox.enabled }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "reading-notifs.fullname" .)) }}
        {{- end }}
        {{- if .Values.camoufox.enabled }}
        # tmpfs for the browser's /dev/shm. medium: Memory is charged against the pod
        # memory limit — see the shmSizeLimit note in values.yaml.
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.camoufox.shmSizeLimit }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
