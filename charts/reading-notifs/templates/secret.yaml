{{- if not .Values.secrets.existingSecret -}}
{{- if not .Values.secrets.betterAuthSecret -}}
{{- fail "secrets.betterAuthSecret is required (set it, or point secrets.existingSecret at a Secret that defines BETTER_AUTH_SECRET)" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reading-notifs.fullname" . }}
  labels:
    {{- include "reading-notifs.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
  SMTP_USER: {{ .Values.secrets.smtp.user | quote }}
  SMTP_PASS: {{ .Values.secrets.smtp.pass | quote }}
  VAPID_PRIVATE_KEY: {{ .Values.secrets.vapid.privateKey | quote }}
{{- end }}
